<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <link rel="stylesheet" href="./assets/css/carrito.css">
</head>

<body>

    <header class="navbar-carrito">
        <section class="carrito">
            <div class="container">
                <h1 class="mb-0">
                    <i class="bi bi-cart3"></i> Mi Carrito
                </h1>
            </div>
        </section>

    </header>

    <main class="container my-5">
        <div class="row g-4">


            <div class="col-lg-8">


                <div id="carrito-vacio" class="text-center py-5 d-none">
                    <i class="bi bi-cart-x" style="font-size: 5rem; color: #ccc;"></i>
                    <h3 class="mt-3 text-muted">Tu carrito está vacío</h3>
                    <p class="text-muted">¡Agregá productos para comenzar!</p>
                    <a href="./juegos.html" class="btn btn-primary mt-2">
                        <i class="bi bi-controller"></i> Ver Juegos
                    </a>
                </div>

                <div id="carrito-items">

                </div>

                <div id="btn-vaciar-container" class="mt-3 d-none">
                    <button id="btn-vaciar" class="btn btn-outline-danger">
                        <i class="bi bi-trash3"></i> Vaciar carrito
                    </button>
                </div>

            </div>

            <div class="col-lg-4">
                <div class="p-3 rounded-3"
                    style="background: rgba(22, 22, 42, 0.9); border: 1px solid rgba(139,92,246,.35);">
                    <h3 class="text-white mb-3">Pedido</h3>

                    <div class="d-flex justify-content-between text-white mb-2">

                        <span id="subtotal"></span>
                    </div>

                    <div class="d-flex justify-content-between text-white mb-3 fw-bold">
                        <span>Total:</span>
                        <span id="total">-</span>
                    </div>

                    <button id="btn-comprar" class="w-100 btn btn-primary">
                        <i class="bi bi-bag-check"></i> Comprar
                    </button>

                    <p id="error_carrito" class="text-danger mt-2" style="display:none;"></p>
                </div>
            </div>

        </div>



    </main>
    <hr>
<footer>
    <div class="container">
        <div class="row">

            <!-- Logo / Nombre -->
            <div class="col-md-4 mb-3">
                <h5 class="fw-bold">MagicKing</h5>
                <p class="text-muted small">Tu tienda de juegos favorita</p>
            </div>

            <!-- Links -->
            <div class="col-md-4 mb-3">
                <h6 class="fw-bold">Links</h6>
                <ul class="list-unstyled">
                    <li><a href="./juegos.html" class="text-muted text-decoration-none">Juegos</a></li>
                    <li><a href="./rompecabezas.html" class="text-muted text-decoration-none">Rompecabezas</a></li>
                    <li><a href="index.html" class="text-muted text-decoration-none">Inicio</a></li>
                </ul>
            </div>

            <!-- Redes -->
            <div class="col-md-4 mb-3">
                <h6 class="fw-bold">Seguinos</h6>
                <a href="#" class="text-muted me-3"><i class="bi bi-instagram fs-5"></i></a>
                <a href="#" class="text-muted me-3"><i class="bi bi-facebook fs-5"></i></a>
                <a href="#" class="text-muted"><i class="bi bi-twitter-x fs-5"></i></a>
            </div>

        </div>

        <hr class="border-secondary">
        <p class="text-muted small mb-0">© 2026 MagicKing. Todos los derechos reservados.</p>
    </div>

</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>


    <script src="assets/js/carrito.js"></script>


</body>



</html>
