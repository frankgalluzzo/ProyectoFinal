<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/carrito.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

    <header class="navbar-carrito">
        <section class="carrito">
            <div class="container">
                <h1 class="mb-0">
                    <i class="bi bi-cart3"></i> Mi Carrito
                </h1>
            </div>
        </section>

    </header>

    <main class="container my-5">
        <div class="row g-4">


            <div class="col-lg-8">


                <div id="carrito-vacio" class="text-center py-5 d-none">
                    <i class="bi bi-cart-x" style="font-size: 5rem; color: #ccc;"></i>
                    <h3 class="mt-3 text-muted">Tu carrito está vacío</h3>
                    <p class="text-muted">¡Agregá productos para comenzar!</p>
                    <a href="./juegos.html" class="btn btn-primary mt-2">
                        <i class="bi bi-controller"></i> Ver Juegos
                    </a>
                </div>

                <div id="carrito-items">

                </div>

                <div id="btn-vaciar-container" class="mt-3 d-none">
                    <button id="btn-vaciar" class="btn btn-outline-danger">
                        <i class="bi bi-trash3"></i> Vaciar carrito
                    </button>
                </div>

            </div>

            <div class="col-lg-4">
                <div class="p-3 rounded-3"
                    style="background: rgba(22, 22, 42, 0.9); border: 1px solid rgba(139,92,246,.35);">
                    <h3 class="text-white mb-3">Pedido</h3>

                    <div class="d-flex justify-content-between text-white mb-2">

                        <span id="subtotal"></span>
                    </div>

                    <div class="d-flex justify-content-between text-white mb-3 fw-bold">
                        <span>Total:</span>
                        <span id="total">-</span>
                    </div>

                    <button id="btn-comprar" class="w-100 btn btn-primary">
                        <i class="bi bi-bag-check"></i> Comprar
                    </button>

                    <p id="error_carrito" class="text-danger mt-2" style="display:none;"></p>
                </div>
            </div>

        </div>
    </main>

    <footer id="footer">
        <div class="container">
            <div class="row align-items-center py-4">
                <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
                    <h5 class="mb-0">MagicKing</h5>
                    <small>© 2026 Todos los derechos reservados</small>
                </div>
                <div class="col-md-4 text-center mb-3 mb-md-0">
                    <ul class="footer-links">
                        <li><a href="index.html">🏠 Inicio</a></li>
                        <li><a href="juegos.html">🎲 Juegos</a></li>
                        <li><a href="rompecabezas.html">🧩 Rompecabezas</a></li>
                        <li><a href="contactos.html">📩 Contactos</a></li>
                    </ul>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <p>Seguinos en nuestras redes</p>
                    <a href="https://x.com" target="_blank" class="social-link" title="X / Twitter">
                        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="X / Twitter"
                            class="social-icon">
                    </a>

                    <a href="https://instagram.com" target="_blank" class="social-link" title="Instagram">
                        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"
                            alt="Instagram" class="social-icon">
                    </a>

                    <a href="https://facebook.com" target="_blank" class="social-link" title="Facebook">
                        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"
                            alt="Facebook" class="social-icon">
                    </a>

                </div>

            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
    
    <script src="assets/js/app.js"></script>
    <script src="assets/js/index.js"></script>
    <script src="assets/js/juegos.js"></script>
    <script src="assets/js/rompecabezas.js"></script>
    <script src="assets/js/carrito.js"></script>


</body>



</html>
